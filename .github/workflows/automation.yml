name: Zotero to Readwise Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # Runs at 03:00 AM (UTC) every day (Check https://crontab.guru/)

jobs:
  zotero-to-readwise-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 🍽️ Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ♻️ Restore last synced Zotero version
        id: sync-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            since
            synced_item_keys.json
          key: zotero-since-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            zotero-since-${{ github.ref_name }}-

      - name: 🐍 Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: 💿 Install Python dependencies
        run: pip install pyzotero requests

      - name: 🚀 Run Automation
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
        run: python run.py --use_since --skip_previously_synced

      - name: ♻️ Save last synced Zotero version
        if: ${{ success() }}
        uses: actions/cache/save@v4
        with:
          path: |
            since
            synced_item_keys.json
          key: ${{ steps.sync-cache-restore.outputs.cache-primary-key }}
